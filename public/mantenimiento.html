<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servicio no disponible | ZIII HoS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #020617;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 70% 50% at -10% 0%, rgba(6,182,212,0.08), transparent),
        radial-gradient(ellipse 60% 40% at 110% 100%, rgba(16,185,129,0.06), transparent),
        #020617;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 36px 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    h1 {
      margin-top: 16px;
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    p {
      margin-top: 8px;
      font-size: 14px;
      color: #475569;
      line-height: 1.65;
    }

    .divider {
      margin: 22px 0;
      border: none;
      border-top: 1px solid #f1f5f9;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: #2563eb;
      transition: background 0.15s;
    }

    .btn:hover { background: #1d4ed8; }

    .note {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card" role="status">
    <img src="https://ziii.com.mx/logos/1ZIIIlogo.png" alt="ZIII HoS" class="logo" />
    <h1>Volveremos en breve</h1>
    <p>
      Pedimos disculpas por la interrupcion.<br />
      Estamos aplicando mejoras al sistema y el servicio estara disponible muy pronto.
    </p>
    <hr class="divider" />
    <a class="btn" href="/">Reintentar</a>
    <div class="note">ZIII Hospitality Suite &mdash; Area de Sistemas</div>
  </div>
</body>
</html>
